apiVersion: v1
kind: Secret
metadata:
  name: recruitment-secrets
  namespace: recruitment
type: Opaque
stringData:
  MYSQL_DSN: "root:CHANGE_ME@tcp(mysql:3306)/recruitment?charset=utf8mb4&parseTime=True&loc=Local"
  JWT_SECRET: "CHANGE_ME"
  AI_API_KEY: "CHANGE_ME"
  OSS_ACCESS_KEY_ID: "CHANGE_ME"
  OSS_ACCESS_KEY_SECRET: "CHANGE_ME"
  REDIS_PASSWORD: ""
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  GRPC_INTERNAL_TOKEN: "CHANGE_ME"

# ============================================================
# 安全警告：此文件仅供示例，所有值均为占位符。
# 生产部署前必须替换所有 CHANGE_ME 和空密码为强密钥。
# JWT_SECRET 必须 >= 32 字符随机字符串。
# 切勿将包含真实值的 secret.yaml 提交到版本控制。
# ============================================================
# Do NOT commit this file with real values. Copy to secret.yaml and fill in.
