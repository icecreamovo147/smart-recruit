apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gin-service
  namespace: recruitment
  labels:
    app: web-gin-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-gin-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: web-gin-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: recruitment/web-gin-service:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: web-config
            - secretRef:
                name: recruitment-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: recruitment
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-gin-service
