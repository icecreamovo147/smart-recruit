apiVersion: apps/v1
kind: Deployment
metadata:
  name: logic-grpc-service
  namespace: recruitment
  labels:
    app: logic-grpc-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logic-grpc-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: logic-grpc-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: logic
          image: recruitment/logic-grpc-service:latest
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: DISABLE_BACKGROUND_WORKERS
              value: "true"
          envFrom:
            - configMapRef:
                name: logic-config
            - secretRef:
                name: recruitment-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: logic-pdb
  namespace: recruitment
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: logic-grpc-service
