mysql:
  dsn: "root:your_password@tcp(127.0.0.1:3306)/recruitment?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "1h"
  conn_max_idle_time: "10m"

oss:
  provider: "tencent_cos" # tencent_cos / aliyun_oss
  endpoint: ""
  access_key_id: ""
  access_key_secret: ""
  bucket_name: ""
  public_base_url: "http://localhost:9000"

ai:
  api_key: ""
  model: "qwen-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  agent_runtime: "adk"                 # AI_AGENT_RUNTIME: adk / legacy
  timeout: "90s"
  # Phase 2-5: high-availability AI tuning knobs.
  total_timeout: "120s"                # AI_TOTAL_TIMEOUT: end-to-end budget per conversation
  tool_max_rounds: 5                   # AI_TOOL_MAX_ROUNDS: max tool-calling rounds
  tool_total_timeout: "30s"            # AI_TOOL_TOTAL_TIMEOUT: cumulative tool execution budget
  max_concurrency: 10                  # AI_MAX_CONCURRENCY: concurrent LLM call limit (semaphore)
  circuit_failure_threshold: 5         # AI_CIRCUIT_FAILURE_THRESHOLD: consecutive failures to open
  circuit_open_timeout: "30s"          # AI_CIRCUIT_OPEN_TIMEOUT: time before half-open probe
  circuit_half_open_max_requests: 2    # AI_CIRCUIT_HALF_OPEN_MAX_REQUESTS: max concurrent probes
  retry_max_attempts: 2               # AI_RETRY_MAX_ATTEMPTS: max retries for 429/5xx/timeout
  retry_base_delay: "500ms"           # AI_RETRY_BASE_DELAY: base for exponential backoff
  slow_response_threshold: "5s"       # AI_SLOW_RESPONSE_THRESHOLD: emit timeout_warning status

jwt:
  # 本地部署时必须填写，且必须与 Web 网关使用的 JWT_SECRET 完全一致。
  # Docker / K8s 部署时通过 JWT_SECRET 环境变量注入，会覆盖此处配置。
  # 示例（请替换为实际密钥）:
  #   secret: "dev-jwt-secret-at-least-32-chars-long!!"
  secret: ""

grpc:
  port: 50051

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 20
  min_idle_conns: 5
  dial_timeout: "2s"
  read_timeout: "1s"
  write_timeout: "1s"

agent:
  recent_message_limit: 20
  summary_trigger_messages: 30
  max_memory_chars: 1500
  max_prompt_chars: 20000
  max_memories: 10

rabbitmq:
  url: "amqp://guest:guest@127.0.0.1:5672/"
  exchange: "recruitment.events"
  dlx_exchange: "recruitment.events.dlx"
  retry_exchange: "recruitment.events.retry"
  notification_queue: "recruitment.notification.create"
  resume_parse_queue: "recruitment.resume.parse"
  prefetch_count: 10
  max_retries: 5
  retry_delay: "5s"
  reconnect_interval: "3s"
