// ── Dashboard Report ─────────────────────────────────────────────────

message GetDashboardReportRequest {
  int64 staff_user_id = 1;
}

message DashboardReportItem {
  string stage_key = 1;
  string stage_label = 2;
  int64 count = 3;
}

message DashboardTrendPoint {
  string date = 1;
  int64 applications = 2;
}

message GetDashboardReportResponse {
  int32 code = 1;
  string msg = 2;

  // KPI
  int64 online_jobs = 3;
  int64 offline_jobs = 4;
  int64 total_applications = 5;
  int64 today_applications = 6;
  int64 unread_notifications = 7;
  int64 pending_actions = 8;

  // Trend (last 7 days)
  repeated DashboardTrendPoint trend = 9;

  // Stage distribution (funnel)
  repeated DashboardReportItem stage_distribution = 10;
}

