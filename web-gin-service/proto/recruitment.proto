// recruitment.proto v1.0
// 生成命令: protoc --go_out=. --go-grpc_out=. proto/recruitment.proto

syntax = "proto3";

package recruitment;

option go_package = "recruitment/pb;pb";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc RevokeRefreshToken(RevokeRefreshTokenRequest) returns (CommonResponse);
  rpc RecordAuthDecision(AuthAuditRequest) returns (CommonResponse);
  rpc GetPrincipal(GetPrincipalRequest) returns (GetPrincipalResponse);
}

service JobService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc UpdateJob(UpdateJobRequest) returns (CommonResponse);
  rpc OfflineJob(OfflineJobRequest) returns (CommonResponse);
  rpc OnlineJob(OfflineJobRequest) returns (CommonResponse);
  rpc ListHRJobs(ListHRJobsRequest) returns (ListJobsResponse);
  rpc ListPublicJobs(ListPublicJobsRequest) returns (ListJobsResponse);
  rpc GetJobDetail(GetJobDetailRequest) returns (GetJobDetailResponse);
  rpc ListJobOptions(ListJobOptionsRequest) returns (ListJobOptionsResponse);
  rpc ListDepartmentLocations(ListDepartmentLocationsRequest) returns (ListDepartmentLocationsResponse);
}

service CandidateService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (GetProfileResponse);
  rpc GetResume(GetResumeRequest) returns (GetResumeResponse);
  rpc PresignResumeUpload(PresignResumeUploadRequest) returns (PresignResumeUploadResponse);
  rpc ConfirmResumeUpload(ConfirmResumeUploadRequest) returns (ConfirmResumeUploadResponse);
}

service ApplicationService {
  rpc ApplyJob(ApplyJobRequest) returns (CommonResponse);
  rpc ListMyApplications(ListMyApplicationsRequest) returns (ListMyApplicationsResponse);
  rpc ListJobApplications(ListJobApplicationsRequest) returns (ListJobApplicationsResponse);
  rpc UpdateApplicationStatus(UpdateApplicationStatusRequest) returns (CommonResponse);
  rpc ListApplicationStatusTransitions(ListApplicationStatusTransitionsRequest) returns (ListApplicationStatusTransitionsResponse);
}

service InterviewService {
  rpc ScheduleInterview(ScheduleInterviewRequest) returns (ScheduleInterviewResponse);
  rpc UpdateInterview(UpdateInterviewRequest) returns (CommonResponse);
  rpc CancelInterview(CancelInterviewRequest) returns (CommonResponse);
  rpc GetInterview(GetInterviewRequest) returns (GetInterviewResponse);
  rpc ListInterviewers(ListInterviewersRequest) returns (ListInterviewersResponse);
  rpc ListApplicationInterviews(ListApplicationInterviewsRequest) returns (ListApplicationInterviewsResponse);
  rpc ListMyInterviews(ListMyInterviewsRequest) returns (ListMyInterviewsResponse);
  rpc ListCandidateInterviews(ListCandidateInterviewsRequest) returns (ListCandidateInterviewsResponse);
  rpc SubmitFeedback(SubmitFeedbackRequest) returns (CommonResponse);
  rpc GetFeedback(GetFeedbackRequest) returns (GetFeedbackResponse);
}

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc UnreadNotificationCount(UnreadNotificationCountRequest) returns (UnreadNotificationCountResponse);
  rpc NotificationSummary(NotificationSummaryRequest) returns (NotificationSummaryResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (CommonResponse);
  rpc MarkAllNotificationsRead(MarkAllNotificationsReadRequest) returns (CommonResponse);
}

service AIService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatStreamResponse);
  rpc History(ChatHistoryRequest) returns (ChatHistoryResponse);
  rpc AnalyzeApplication(AnalyzeApplicationRequest) returns (AnalyzeApplicationResponse);
  rpc ListChatSessions(ChatSessionListRequest) returns (ChatSessionListResponse);
  rpc CreateChatSession(CreateChatSessionRequest) returns (CreateChatSessionResponse);
  rpc SessionMessages(SessionMessagesRequest) returns (ChatHistoryResponse);
  rpc CreateApplicationAnalysisSession(CreateApplicationAnalysisSessionRequest) returns (CreateApplicationAnalysisSessionResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (CommonResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (CommonResponse);

  // Candidate AI
  rpc CandidateChatStream(CandidateChatRequest) returns (stream ChatStreamResponse);
  rpc CandidateListSessions(CandidateSessionListRequest) returns (ChatSessionListResponse);
  rpc CandidateCreateSession(CandidateCreateSessionRequest) returns (CreateChatSessionResponse);
  rpc CandidateSessionMessages(CandidateSessionMessagesRequest) returns (ChatHistoryResponse);
  rpc CandidateUpdateSession(CandidateUpdateSessionRequest) returns (CommonResponse);
  rpc CandidateDeleteSession(CandidateDeleteSessionRequest) returns (CommonResponse);
}

service OfferService {
  rpc CreateOffer(CreateOfferRequest) returns (CreateOfferResponse);
  rpc UpdateOffer(UpdateOfferRequest) returns (CommonResponse);
  rpc GetOffer(GetOfferRequest) returns (GetOfferResponse);
  rpc ListOffersByApplication(ListOffersByApplicationRequest) returns (ListOffersByApplicationResponse);
  rpc SendOffer(SendOfferRequest) returns (CommonResponse);
  rpc WithdrawOffer(WithdrawOfferRequest) returns (CommonResponse);
  rpc AcceptOffer(AcceptOfferRequest) returns (CommonResponse);
  rpc RejectOffer(RejectOfferRequest) returns (CommonResponse);
  rpc ListMyOffers(ListMyOffersRequest) returns (ListMyOffersResponse);
  rpc ListOfferEvents(ListOfferEventsRequest) returns (ListOfferEventsResponse);
}

service AdminService {
  rpc CreateInviteCode(CreateInviteCodeRequest) returns (CreateInviteCodeResponse);
  rpc ListInviteCodes(ListInviteCodesRequest) returns (ListInviteCodesResponse);
  rpc ExtendInviteCode(ExtendInviteCodeRequest) returns (CommonResponse);
  rpc RevokeInviteCode(RevokeInviteCodeRequest) returns (CommonResponse);
  rpc ReactivateInviteCode(ReactivateInviteCodeRequest) returns (CommonResponse);
  rpc ValidateInviteCode(ValidateInviteCodeRequest) returns (ValidateInviteCodeResponse);

  rpc ListDepartments(ListDepartmentsRequest) returns (ListDepartmentsResponse);
  rpc CreateDepartment(CreateDepartmentRequest) returns (DepartmentResponse);
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (DepartmentResponse);
  rpc UpdateDepartmentStatus(UpdateDepartmentStatusRequest) returns (CommonResponse);
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (CommonResponse);

  rpc ListJobLocations(ListJobLocationsRequest) returns (ListJobLocationsResponse);
  rpc CreateJobLocation(CreateJobLocationRequest) returns (JobLocationResponse);
  rpc UpdateJobLocation(UpdateJobLocationRequest) returns (JobLocationResponse);
  rpc UpdateJobLocationStatus(UpdateJobLocationStatusRequest) returns (CommonResponse);
  rpc DeleteJobLocation(DeleteJobLocationRequest) returns (CommonResponse);

  rpc GetDepartmentLocationConfig(GetDepartmentLocationConfigRequest) returns (DepartmentLocationConfigResponse);
  rpc UpdateDepartmentLocationConfig(UpdateDepartmentLocationConfigRequest) returns (DepartmentLocationConfigResponse);
  rpc ListDepartmentsLocationMap(ListDepartmentsLocationMapRequest) returns (ListDepartmentsLocationMapResponse);

  rpc QueryUsageLogs(QueryUsageLogsRequest) returns (QueryUsageLogsResponse);

  // RBAC role and permission management
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
  rpc AssignUserRole(AssignUserRoleRequest) returns (CommonResponse);
  rpc RevokeUserRole(RevokeUserRoleRequest) returns (CommonResponse);
  rpc AssignDataScope(AssignDataScopeRequest) returns (CommonResponse);
  rpc RevokeDataScope(RevokeDataScopeRequest) returns (CommonResponse);

  // Staff user management
  rpc ListStaffUsers(ListStaffUsersRequest) returns (ListStaffUsersResponse);
  rpc CreateStaffUser(CreateStaffUserRequest) returns (CreateStaffUserResponse);

  // ── Phase 6: Analytics & AI Audit ─────────────────────────────────────
  rpc QueryAuthAuditLogs(QueryAuthAuditLogsRequest) returns (QueryAuthAuditLogsResponse);
  rpc GetDashboardReport(GetDashboardReportRequest) returns (GetDashboardReportResponse);
  rpc GetFunnelReport(GetFunnelReportRequest) returns (GetFunnelReportResponse);
  rpc GetTimeInStageReport(GetTimeInStageReportRequest) returns (GetTimeInStageReportResponse);
  rpc GetInterviewOfferMetrics(GetInterviewOfferMetricsRequest) returns (GetInterviewOfferMetricsResponse);
}

// ── Phase 4: Candidate Collaboration ───────────────────────────────────

service CollaborationService {
  // Candidate workspace aggregation
  rpc GetCandidateWorkspace(GetCandidateWorkspaceRequest) returns (GetCandidateWorkspaceResponse);

  // Notes
  rpc CreateNote(CreateNoteRequest) returns (CreateNoteResponse);
  rpc ListNotes(ListNotesRequest) returns (ListNotesResponse);

  // Tags
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc AssignTag(AssignTagRequest) returns (CommonResponse);
  rpc UnassignTag(UnassignTagRequest) returns (CommonResponse);
  rpc ListCandidateTags(ListCandidateTagsRequest) returns (ListCandidateTagsResponse);

  // Follow-up tasks
  rpc CreateFollowUpTask(CreateFollowUpTaskRequest) returns (CreateFollowUpTaskResponse);
  rpc ListFollowUpTasks(ListFollowUpTasksRequest) returns (ListFollowUpTasksResponse);
  rpc CompleteFollowUpTask(CompleteFollowUpTaskRequest) returns (CommonResponse);
  rpc GetFollowUpTask(GetFollowUpTaskRequest) returns (GetFollowUpTaskResponse);

  // Timeline
  rpc ListTimelineEvents(ListTimelineEventsRequest) returns (ListTimelineEventsResponse);
}

message CommonResponse {
  int32 code = 1;
  string msg = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  int32 role = 3;
  string email = 4;
  string invite_code = 5;  // Required for staff (non-candidate) registration
}

message RegisterResponse {
  int32 code = 1;
  string msg = 2;
  int64 user_id = 3;
  string username = 4;
  int32 role = 5;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  int32 code = 1;
  string msg = 2;
  string token = 3;
  int64 user_id = 4;
  int32 role = 5;           // Deprecated: kept for migration compatibility
  string username = 6;
  string account_type = 7;  // candidate | staff | service
  repeated string roles = 8;       // RBAC role keys
  repeated string permissions = 9; // RBAC permission keys
  int32 token_version = 10;        // Incremented on permission change
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string client_ip = 2;
  string user_agent = 3;
}

message RefreshTokenResponse {
  int32 code = 1;
  string msg = 2;
  int64 user_id = 3;
  string username = 4;
  int32 role = 5;           // Deprecated: kept for migration compatibility
  string refresh_token = 6;
  int64 refresh_expires_at = 7;
  string account_type = 8;  // candidate | staff | service
  repeated string roles = 9;       // RBAC role keys
  repeated string permissions = 10; // RBAC permission keys
  int32 token_version = 11;        // Incremented on permission change
}

message RevokeRefreshTokenRequest {
  string refresh_token = 1;
}

message AuthAuditRequest {
  int64 actor_user_id = 1;
  string actor_roles = 2;
  string permission_key = 3;
  string resource_type = 4;
  uint64 resource_id = 5;
  string decision = 6;
  string reason = 7;
  string request_id = 8;
  string client_ip = 9;
}

message GetPrincipalRequest {
  int64 user_id = 1;
}

message GetPrincipalResponse {
  int32 code = 1;
  string msg = 2;
  int64 user_id = 3;
  string username = 4;
  string account_type = 5;
  int32 role = 6;                      // Deprecated: legacy numeric role
  repeated string roles = 7;           // RBAC role keys
  repeated string permissions = 8;     // RBAC permission keys
  int32 token_version = 9;
  repeated ScopeAssignment data_scopes = 10;
}

message ScopeAssignment {
  string scope_key = 1;
  string resource_type = 2;
  int64 resource_id = 3;
}

message CreateJobRequest {
  int64 hr_id = 1;
  string title = 2;
  string department = 3;
  string location = 4;
  string salary_range = 5;
  string description = 6;
  string requirements = 7;
  int64 department_id = 8;
  int64 location_id = 9;
}

message CreateJobResponse {
  int32 code = 1;
  string msg = 2;
  int64 job_id = 3;
}

message UpdateJobRequest {
  int64 hr_id = 1;
  int64 job_id = 2;
  string title = 3;
  string department = 4;
  string location = 5;
  string salary_range = 6;
  string description = 7;
  string requirements = 8;
  int64 department_id = 9;
  int64 location_id = 10;
}

message OfflineJobRequest {
  int64 hr_id = 1;
  int64 job_id = 2;
}

message ListHRJobsRequest {
  int64 hr_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string cursor = 4;
}

message ListPublicJobsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string cursor = 4;
}

message GetJobDetailRequest {
  int64 job_id = 1;
}

message Job {
  int64 job_id = 1;
  int64 hr_id = 2;
  string title = 3;
  string department = 4;
  string location = 5;
  string salary_range = 6;
  string description = 7;
  string requirements = 8;
  int32 status = 9;
  int64 application_count = 10;
  string created_at = 11;
  int64 department_id = 12;
  int64 location_id = 13;
}

message ListJobsResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  repeated Job list = 4;
  string next_cursor = 5;
  bool has_more = 6;
}

message GetJobDetailResponse {
  int32 code = 1;
  string msg = 2;
  Job job = 3;
}

message GetProfileRequest {
  int64 user_id = 1;
}

message UpdateProfileRequest {
  int64 user_id = 1;
  string real_name = 2;
  string phone = 3;
  string education = 4;
  string school = 5;
  string work_experience = 6;
  string skills = 7;
}

message CandidateProfile {
  string real_name = 1;
  string phone = 2;
  string education = 3;
  string school = 4;
  string work_experience = 5;
  repeated string skills = 6;
  bool is_complete = 7;
}

message GetProfileResponse {
  int32 code = 1;
  string msg = 2;
  CandidateProfile profile = 3;
}

message GetResumeRequest {
  int64 user_id = 1;
}

message CandidateResume {
  int64 resume_id = 1;
  string file_name = 2;
  string file_type = 3;
  int64 file_size = 4;
  string uploaded_at = 5;
  string resume_url = 6;
}

message GetResumeResponse {
  int32 code = 1;
  string msg = 2;
  CandidateResume resume = 3;
}

message PresignResumeUploadRequest {
  int64 user_id = 1;
  string file_name = 2;
  string file_type = 3;
}

message PresignResumeUploadResponse {
  int32 code = 1;
  string msg = 2;
  string upload_url = 3;
  string oss_key = 4;
  string expire_at = 5;
  string upload_id = 6;
}

message ConfirmResumeUploadRequest {
  int64 user_id = 1;
  string oss_key = 2;
  string file_name = 3;
  string file_type = 4;
  int64 file_size = 5;
  string upload_id = 6;
}

message ConfirmResumeUploadResponse {
  int32 code = 1;
  string msg = 2;
  int64 resume_id = 3;
}

message ApplyJobRequest {
  int64 user_id = 1;
  int64 job_id = 2;
}

message ListMyApplicationsRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string cursor = 4;
}

message MyApplication {
  int64 application_id = 1;
  int64 job_id = 2;
  string job_title = 3;
  int32 status = 4;
  string applied_at = 5;
  int32 round_no = 6;
  int32 is_current = 7;
  string status_key = 8;
}

message ListMyApplicationsResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  repeated MyApplication list = 4;
  string next_cursor = 5;
  bool has_more = 6;
}

message ListJobApplicationsRequest {
  int64 hr_id = 1;
  int64 job_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message JobApplication {
  int64 application_id = 1;
  int64 user_id = 2;
  string real_name = 3;
  string phone = 4;
  string education = 5;
  string school = 6;
  repeated string skills = 7;
  string applied_at = 8;
  string resume_url = 9;
  int32 status = 10;
  int32 round_no = 11;
  int32 is_current = 12;
  string file_name = 13;
  string file_type = 14;
  string status_key = 15;
}

message ListJobApplicationsResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  repeated JobApplication list = 4;
}

message UpdateApplicationStatusRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
  int32 status = 3;
  string status_key = 4;
  string reason = 5;
}

message ListApplicationStatusTransitionsRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
}

message ApplicationStatusTransition {
  int64 id = 1;
  int64 application_id = 2;
  string from_status = 3;
  string to_status = 4;
  int64 actor_user_id = 5;
  string actor_account_type = 6;
  string reason = 7;
  string created_at = 8;
}

message ListApplicationStatusTransitionsResponse {
  int32 code = 1;
  string msg = 2;
  repeated ApplicationStatusTransition list = 3;
}

message ChatRequest {
  int64 hr_id = 1;
  string message = 2;
  int64 application_id = 3;
  int64 session_id = 4;
}

message ChatResponse {
  int32 code = 1;
  string msg = 2;
  string reply = 3;
  string created_at = 4;
  string action = 5;
  int64 application_id = 6;
  int32 action_status = 7;
  string candidate_name = 8;
  string job_title = 9;
  int32 status = 10;
  int64 session_id = 11;
}

message ChatStreamResponse {
  int32 code = 1;
  string msg = 2;
  string delta = 3;
  bool done = 4;
  string action = 5;
  int64 application_id = 6;
  int32 action_status = 7;
  string candidate_name = 8;
  string job_title = 9;
  int32 status = 10;
  int64 session_id = 11;
  string created_at = 12;
  string candidate_options = 13;
  repeated string suggested_questions = 14;
  // Phase 4: streaming UX state events.
  // event_type values: thinking | tool_calling | tool_done | generating | timeout_warning | partial_done | done | error
  string event_type = 15;
  string event_message = 16;
  // error_type maps to AIErrorType when event_type == "error" or "partial_done" (e.g. AI_TIMEOUT, AI_RATE_LIMITED).
  string error_type = 17;
  // tool_name carries the active tool when event_type == "tool_calling" or "tool_done".
  string tool_name = 18;
}

message ChatHistoryRequest {
  int64 hr_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ChatMessage {
  string role = 1;
  string content = 2;
  string created_at = 3;
}

message ChatHistoryResponse {
  int32 code = 1;
  string msg = 2;
  repeated ChatMessage list = 3;
}

message AnalyzeApplicationRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
}

message AnalyzeApplicationResponse {
  int32 code = 1;
  string msg = 2;
  string reply = 3;
  string candidate_name = 4;
  string job_title = 5;
  int32 status = 6;
  int32 round_no = 7;
}

message ChatSessionListRequest {
  int64 hr_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ChatSession {
  int64 session_id = 1;
  string title = 2;
  int64 application_id = 3;
  string created_at = 4;
  string updated_at = 5;
}

message ChatSessionListResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  repeated ChatSession list = 4;
}

message CreateChatSessionRequest {
  int64 hr_id = 1;
  string title = 2;
}

message CreateChatSessionResponse {
  int32 code = 1;
  string msg = 2;
  ChatSession session = 3;
}

message SessionMessagesRequest {
  int64 hr_id = 1;
  int64 session_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message CreateApplicationAnalysisSessionRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
}

message CreateApplicationAnalysisSessionResponse {
  int32 code = 1;
  string msg = 2;
  ChatSession session = 3;
  repeated ChatMessage messages = 4;
}

message UpdateSessionRequest {
  int64 hr_id = 1;
  int64 session_id = 2;
  string title = 3;
}

message DeleteSessionRequest {
  int64 hr_id = 1;
  int64 session_id = 2;
}

// ---- Candidate AI messages ----

message CandidateChatRequest {
  int64 user_id = 1;
  string message = 2;
  int64 session_id = 3;
}

message CandidateSessionListRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message CandidateCreateSessionRequest {
  int64 user_id = 1;
  string title = 2;
}

message CandidateSessionMessagesRequest {
  int64 user_id = 1;
  int64 session_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message CandidateUpdateSessionRequest {
  int64 user_id = 1;
  int64 session_id = 2;
  string title = 3;
}

message CandidateDeleteSessionRequest {
  int64 user_id = 1;
  int64 session_id = 2;
}

// ── Interview ─────────────────────────────────────────────────────────

message InterviewSchedule {
  int64 interview_id = 1;
  int64 application_id = 2;
  int64 interviewer_id = 3;
  int32 round_no = 4;
  string title = 5;
  string mode = 6;        // video / phone / onsite
  string meeting_url = 7;
  string location = 8;
  int32 duration_minutes = 9;
  string candidate_note = 10;
  string internal_note = 11;
  string cancel_reason = 12;
  string scheduled_at = 13;
  string status = 14;     // pending / scheduled / completed / cancelled
  int64 created_by = 15;
  string created_at = 16;
  string updated_at = 17;

  // Joined fields for display
  string interviewer_name = 18;
  string application_status_key = 19;
  string job_title = 20;
  string candidate_name = 21;
  string candidate_phone = 22;
  string resume_url = 23;
  bool has_feedback = 24;  // 当前面试官是否已提交反馈
}

message ScheduleInterviewRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
  int64 interviewer_id = 3;
  int32 round_no = 4;
  string title = 5;
  string mode = 6;
  string meeting_url = 7;
  string location = 8;
  int32 duration_minutes = 9;
  string candidate_note = 10;
  string internal_note = 11;
  string scheduled_at = 12;  // RFC 3339
}

message ScheduleInterviewResponse {
  int32 code = 1;
  string msg = 2;
  int64 interview_id = 3;
}

message UpdateInterviewRequest {
  int64 hr_id = 1;
  int64 interview_id = 2;
  string title = 3;
  string mode = 4;
  string meeting_url = 5;
  string location = 6;
  int32 duration_minutes = 7;
  string candidate_note = 8;
  string internal_note = 9;
  string scheduled_at = 10;  // RFC 3339
}

message CancelInterviewRequest {
  int64 hr_id = 1;
  int64 interview_id = 2;
  string cancel_reason = 3;
}

message GetInterviewRequest {
  int64 user_id = 1;
  int64 interview_id = 2;
}

message GetInterviewResponse {
  int32 code = 1;
  string msg = 2;
  InterviewSchedule interview = 3;
}

message ListInterviewersRequest {
  int64 hr_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string keyword = 4;
}

message ListInterviewersResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  repeated StaffUserInfo list = 4;
}

message ListApplicationInterviewsRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
}

message ListApplicationInterviewsResponse {
  int32 code = 1;
  string msg = 2;
  repeated InterviewSchedule list = 3;
}

message ListMyInterviewsRequest {
  int64 interviewer_id = 1;
  string status = 2;  // optional filter
}

message ListMyInterviewsResponse {
  int32 code = 1;
  string msg = 2;
  repeated InterviewSchedule list = 3;
}

message ListCandidateInterviewsRequest {
  int64 user_id = 1;
}

message ListCandidateInterviewsResponse {
  int32 code = 1;
  string msg = 2;
  repeated InterviewSchedule list = 3;
}

message InterviewFeedback {
  int64 feedback_id = 1;
  int64 interview_id = 2;
  int64 application_id = 3;
  int64 interviewer_id = 4;
  string recommendation = 5;  // positive / negative / pending
  int32 score = 6;
  string dimension_scores_json = 7;
  string comments = 8;
  string submitted_at = 9;
  string updated_at = 10;
  string interviewer_name = 11;
}

message SubmitFeedbackRequest {
  int64 interviewer_id = 1;
  int64 interview_id = 2;
  int64 application_id = 3;
  string recommendation = 4;
  int32 score = 5;
  string dimension_scores_json = 6;
  string comments = 7;
}

message GetFeedbackRequest {
  int64 interviewer_id = 1;
  int64 interview_id = 2;
}

message GetFeedbackResponse {
  int32 code = 1;
  string msg = 2;
  InterviewFeedback feedback = 3;
}

message Notification {
  int64 notification_id = 1;
  string type = 2;
  string title = 3;
  string content = 4;
  string link = 5;
  string biz_type = 6;
  int64 biz_id = 7;
  bool is_read = 8;
  string created_at = 9;
  string read_at = 10;
}

message ListNotificationsRequest {
  int64 user_id = 1;
  string account_type = 2;
  int32 page = 3;
  int32 page_size = 4;
  string cursor = 5;
}

message ListNotificationsResponse {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
