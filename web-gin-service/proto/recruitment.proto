message GetFunnelReportRequest {
  int64 staff_user_id = 1;
  string start_date = 2;  // RFC 3339, optional
  string end_date = 3;    // RFC 3339, optional
  int64 job_id = 4;       // optional filter
}

message FunnelStage {
  string stage_key = 1;
  string stage_label = 2;
  int64 count = 3;
  double conversion_rate = 4; // rate from previous stage (0-100)
}

message GetFunnelReportResponse {
  int32 code = 1;
  string msg = 2;
  repeated FunnelStage stages = 3;
}

// ── Time-in-Stage Report ─────────────────────────────────────────────

message GetTimeInStageReportRequest {
  int64 staff_user_id = 1;
  string start_date = 2;  // RFC 3339, optional
  string end_date = 3;    // RFC 3339, optional
  int64 job_id = 4;       // optional filter
}

message StageDuration {
  string stage_key = 1;
  string stage_label = 2;
  double avg_hours = 3;    // average hours spent in this stage
  int64 transition_count = 4;
}

message GetTimeInStageReportResponse {
  int32 code = 1;
  string msg = 2;
  repeated StageDuration durations = 3;
}

