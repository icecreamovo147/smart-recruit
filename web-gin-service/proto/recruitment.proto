// ── Offer ────────────────────────────────────────────────────────────

message Offer {
  int64 id = 1;
  int64 application_id = 2;
  int64 candidate_user_id = 3;
  int64 job_id = 4;
  string status = 5;          // draft / sent / accepted / rejected / withdrawn
  string title = 6;
  string salary_range = 7;
  string level = 8;
  string work_location = 9;
  string start_date = 10;
  string expires_at = 11;     // RFC 3339
  string terms_json = 12;
  string sent_snapshot_json = 13;
  int64 created_by = 14;
  int64 sent_by = 15;
  string decided_at = 16;     // RFC 3339
  string created_at = 17;     // RFC 3339
  string updated_at = 18;     // RFC 3339
  // Joined fields
  string job_title = 19;
  string candidate_name = 20;
  string application_status_key = 21;
  string created_by_name = 22;
  string sent_by_name = 23;
}

message CreateOfferRequest {
  int64 hr_id = 1;
  int64 application_id = 2;
  string title = 3;
  string salary_range = 4;
  string level = 5;
  string work_location = 6;
  string start_date = 7;
