// ── Candidate Workspace ────────────────────────────────────────────────

message GetCandidateWorkspaceRequest {
  int64 staff_user_id = 1;
  int64 candidate_user_id = 2;
}

message CandidateWorkspace {
  // Profile
  string real_name = 1;
  string phone = 2;
  string education = 3;
  string school = 4;
  string work_experience = 5;
  repeated string skills = 6;

  // Applications
  repeated CandidateWorkspaceApplication applications = 7;

  // Tags
  repeated CandidateTagInfo tags = 8;

  // Statistics
  int64 total_applications = 9;
  int64 total_interviews = 10;
  int64 total_offers = 11;
  string latest_activity_at = 12;

  // Resume
  string resume_url = 13;

  // Detailed interview and offer records
  repeated CandidateWorkspaceInterview interviews = 14;
  repeated CandidateWorkspaceOffer offers = 15;
}

message CandidateWorkspaceInterview {
  int64 interview_id = 1;
  int64 application_id = 2;
  string title = 3;
  string mode = 4;
  string status = 5;
  string scheduled_at = 6;
  string interviewer_name = 7;
  string job_title = 8;
  int32 round_no = 9;
  // Interview feedback fields
  string feedback_recommendation = 10;
  int32 feedback_score = 11;
  string feedback_dimension_scores_json = 12;
  string feedback_comments = 13;
  bool has_feedback = 14;
}

message CandidateWorkspaceOffer {
  int64 offer_id = 1;
  int64 application_id = 2;
  string title = 3;
  string status = 4;
  string salary_range = 5;
  string level = 6;
  string work_location = 7;
  string start_date = 8;
  string job_title = 9;
}

message CandidateWorkspaceApplication {
  int64 application_id = 1;
  int64 job_id = 2;
  string job_title = 3;
  string department = 4;
  string location = 5;
  string status_key = 6;
  int32 round_no = 7;
  int32 is_current = 8;
  string applied_at = 9;
}

message GetCandidateWorkspaceResponse {
  int32 code = 1;
  string msg = 2;
  CandidateWorkspace workspace = 3;
}

