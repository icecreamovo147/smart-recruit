info:
  contact: {}
  description: 智能招聘平台后端接口文档，包含候选人端和 HR 管理端接口。
  title: 智能招聘系统 API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，返回JWT Token
      parameters:
      - description: 登录凭据
        in: body
        name: body
        required: true
        schema:
          properties:
            password:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/logout:
    post:
      description: 退出登录，清除 Token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /api/v1/auth/me:
    get:
      description: 获取当前已登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 认证
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用 Refresh Token 获取新的 Access Token
      parameters:
      - description: 刷新令牌
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 刷新 Token
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 注册求职者账号（角色：candidate）。HR/管理员账号由管理员通过后台创建。
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
            role:
              type: integer
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证
  /api/v1/auth/register/validate-invite-code:
    post:
      consumes:
      - application/json
      description: 注册前验证邀请码是否有效
      parameters:
      - description: 邀请码
        in: body
        name: body
        required: true
        schema:
          properties:
            code:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 验证邀请码
      tags:
      - 认证
  /api/v1/candidate/ai/chat/stream:
    post:
      consumes:
      - application/json
      description: 候选人端 SSE 流式 AI 对话
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: AI 流式对话
      tags:
      - 候选人-AI
  /api/v1/candidate/ai/sessions:
    get:
      description: 获取候选人的 AI 对话会话列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: AI 会话列表
      tags:
      - 候选人-AI
    post:
      consumes:
      - application/json
      description: 创建新的 AI 对话会话
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 新建 AI 会话
      tags:
      - 候选人-AI
  /api/v1/candidate/ai/sessions/{session_id}:
    delete:
      description: 删除候选人 AI 会话
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除 AI 会话
      tags:
      - 候选人-AI
    put:
      consumes:
      - application/json
      description: 修改会话标题
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 重命名 AI 会话
      tags:
      - 候选人-AI
  /api/v1/candidate/ai/sessions/{session_id}/messages:
    get:
      description: 获取指定会话的消息列表
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
