info:
  contact: {}
  description: 智能招聘平台后端接口文档，包含候选人端和 HR 管理端接口。
  title: 智能招聘系统 API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，返回JWT Token
      parameters:
      - description: 登录凭据
        in: body
        name: body
        required: true
        schema:
          properties:
            password:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 注册求职者账号（角色：candidate）。HR/管理员账号由管理员通过后台创建。
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
            role:
              type: integer
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证
  /api/v1/candidate/applications:
    get:
      consumes:
      - application/json
      description: 查看我的历史投递记录
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 我的投递记录
      tags:
      - 候选人
    post:
      consumes:
      - application/json
      description: 候选人投递指定岗位
      parameters:
      - description: 岗位ID
        in: body
        name: body
        required: true
        schema:
          properties:
            job_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 投递岗位
      tags:
      - 候选人
  /api/v1/candidate/profile:
    get:
      consumes:
      - application/json
      description: 获取候选人个人资料
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取个人档案
      tags:
      - 候选人
    put:
      consumes:
      - application/json
      description: 更新候选人个人资料
      parameters:
      - description: 个人资料
        in: body
        name: body
        required: true
        schema:
          properties:
            education:
              type: string
            phone:
              type: string
            real_name:
              type: string
            school:
              type: string
            skills:
              type: string
            work_experience:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新个人档案
      tags:
      - 候选人
  /api/v1/candidate/resume:
    get:
      consumes:
      - application/json
      description: 获取当前有效简历信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取简历
      tags:
      - 候选人
  /api/v1/candidate/resume/confirm:
    post:
      consumes:
      - application/json
      description: 确认简历文件已上传到OSS
      parameters:
      - description: 确认信息
        in: body
        name: body
        required: true
        schema:
          properties:
            file_name:
              type: string
            file_size:
              type: integer
            file_type:
              type: string
            oss_key:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 确认上传
      tags:
      - 候选人
  /api/v1/candidate/resume/presign:
    post:
      consumes:
      - application/json
      description: 获取OSS预签名上传URL(仅支持PDF)
      parameters:
      - description: 文件信息
        in: body
        name: body
        required: true
        schema:
          properties:
            file_name:
              type: string
            file_type:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取上传签名URL
      tags:
      - 候选人
  /api/v1/hr/ai/analyze-application:
    post:
      consumes:
      - application/json
      description: 分析候选人简历与岗位匹配度
      parameters:
      - description: 投递记录ID
        in: body
        name: body
        required: true
        schema:
          properties:
            application_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 分析投递
      tags:
      - HR-AI助手
  /api/v1/hr/ai/application-analysis-sessions:
    post:
      consumes:
      - application/json
      description: 为指定投递记录创建AI简历分析会话
      parameters:
      - description: 投递记录ID
        in: body
        name: body
        required: true
        schema:
          properties:
            application_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建简历分析会话
      tags:
      - HR-AI助手
  /api/v1/hr/ai/chat:
    post:
      consumes:
      - application/json
      description: 向AI助手发送消息获取回复
      parameters:
      - description: 消息内容
        in: body
        name: body
        required: true
        schema:
          properties:
            application_id:
              type: integer
            message:
              type: string
            session_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: AI对话
      tags:
      - HR-AI助手
  /api/v1/hr/ai/chat/stream:
    post:
      consumes:
      - application/json
      description: SSE流式AI对话
      parameters:
      - description: 消息内容
        in: body
        name: body
        required: true
        schema:
          properties:
            application_id:
              type: integer
            message:
              type: string
            session_id:
              type: integer
          type: object
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: AI流式对话
      tags:
      - HR-AI助手
  /api/v1/hr/ai/history:
    get:
      consumes:
      - application/json
      description: 获取AI对话历史记录
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 对话历史
      tags:
      - HR-AI助手
  /api/v1/hr/ai/sessions:
    get:
      consumes:
      - application/json
      description: 获取AI对话会话列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 会话列表
      tags:
      - HR-AI助手
    post:
      consumes:
      - application/json
      description: 创建新的AI对话会话
      parameters:
      - description: 会话标题
        in: body
        name: body
        schema:
          properties:
            title:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 新建会话
      tags:
      - HR-AI助手
  /api/v1/hr/ai/sessions/{session_id}:
    delete:
      consumes:
      - application/json
      description: 删除AI会话及其历史
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除会话
      tags:
      - HR-AI助手
    put:
      consumes:
      - application/json
      description: 修改AI会话名称
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
        type: integer
      - description: 新名称
        in: body
        name: body
        required: true
        schema:
          properties:
            title:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 重命名会话
      tags:
      - HR-AI助手
  /api/v1/hr/ai/sessions/{session_id}/messages:
    get:
      consumes:
      - application/json
      description: 获取指定会话的消息列表
      parameters:
      - description: 会话ID
        in: path
        name: session_id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 会话消息
      tags:
      - HR-AI助手
  /api/v1/hr/applications/{application_id}/status:
    patch:
      consumes:
      - application/json
      description: 更新投递状态:0待查看/1已查看/2通过/3淘汰
      parameters:
      - description: 投递ID
        in: path
        name: application_id
        required: true
        type: integer
      - description: 状态:0/1/2/3
        in: body
        name: body
        required: true
        schema:
          properties:
            status:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新投递状态
      tags:
      - HR-投递管理
  /api/v1/hr/jobs:
    get:
      consumes:
      - application/json
      description: 获取当前HR创建的岗位列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取HR岗位列表
      tags:
      - HR-岗位管理
    post:
      consumes:
      - application/json
      description: HR创建新的招聘岗位
      parameters:
      - description: 岗位信息
        in: body
        name: body
        required: true
        schema:
          properties:
            department:
              type: string
            description:
              type: string
            location:
              type: string
            requirements:
              type: string
            salary_range:
              type: string
            title:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 新增岗位
      tags:
      - HR-岗位管理
  /api/v1/hr/jobs/{job_id}:
    put:
      consumes:
      - application/json
      description: HR编辑自己创建的岗位
      parameters:
      - description: 岗位ID
        in: path
        name: job_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 编辑岗位
      tags:
      - HR-岗位管理
  /api/v1/hr/jobs/{job_id}/applications:
    get:
      consumes:
      - application/json
      description: 查看指定岗位的投递列表
      parameters:
      - description: 岗位ID
        in: path
        name: job_id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查看候选人台账
      tags:
      - HR-投递管理
  /api/v1/hr/jobs/{job_id}/offline:
    patch:
      consumes:
      - application/json
      description: 将岗位状态改为已下架
      parameters:
      - description: 岗位ID
        in: path
        name: job_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 下架岗位
      tags:
      - HR-岗位管理
  /api/v1/hr/jobs/{job_id}/online:
    patch:
      consumes:
      - application/json
      description: 将已下架岗位重新上线
      parameters:
      - description: 岗位ID
        in: path
        name: job_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 上线岗位
      tags:
      - HR-岗位管理
  /api/v1/jobs:
    get:
      consumes:
      - application/json
      description: 分页浏览在招岗位，支持关键词搜索
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 浏览岗位列表
      tags:
      - 岗位
  /api/v1/jobs/{job_id}:
    get:
      consumes:
      - application/json
      description: 根据岗位ID查看详细信息
      parameters:
      - description: 岗位ID
        in: path
        name: job_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 查看岗位详情
      tags:
      - 岗位
swagger: "2.0"
